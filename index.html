<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SEINFRA/AM — Plataforma de Planejamento de Obras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <!-- Chart.js para histogramas -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- jsPDF para exportação -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.7.0/jspdf.plugin.autotable.min.js"></script>

  <style>
    /* ===== ESTILOS PADRÃO (GOVERNO DO AMAZONAS) ===== */
    :root {
      --azul:         #002D72;
      --azul-hover:   #00348A;
      --azul-claro:   #EBF0FA;
      --azul-borda:   #C4D0E8;
      --amarelo:      #F5A623;
      --amarelo-cl:   #FEF3DC;
      --amarelo-brd:  #F5C878;
      --verde:        #007B3E;
      --verde-cl:     #E6F4ED;
      --vermelho:     #C0392B;
      --vermelho-cl:  #FDECEA;
      --cinza-txt:    #1A2540;
      --cinza-med:    #4A5568;
      --cinza-aux:    #8896A8;
      --cinza-bg:     #F5F7FB;
      --borda:        #E0E6F0;
      --branco:       #FFFFFF;
      --font:         'Outfit', sans-serif;
      --shadow:       0 2px 16px rgba(0,45,114,0.09), 0 0 0 1px var(--borda);
      --shadow-hover: 0 8px 32px rgba(0,45,114,0.14), 0 0 0 1px var(--azul-borda);
      --radius:       12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--cinza-bg);
      color: var(--cinza-txt);
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    ::selection { background: rgba(0,45,114,0.14); }

    /* ===== GOV HEADER (PADRÃO) ===== */
    .gov-header {
      background: #ffffff;
      padding: .75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e0e6f0;
      box-shadow: 0 2px 12px rgba(41,50,88,.08);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .gov-header-logo img {
      height: 80px;
      width: auto;
      object-fit: contain;
      display: block;
    }
    .gov-header-right {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .gov-header-badge {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #ffffff;
      background: var(--azul);
      padding: .35em 1.1em;
      border-radius: 100px;
      white-space: nowrap;
    }
    .gov-header-back {
      font-size: .7rem;
      font-weight: 600;
      color: var(--azul);
      background: transparent;
      border: 1.5px solid var(--azul);
      padding: .32em .85em;
      border-radius: 7px;
      text-decoration: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .gov-header-back:hover {
      background: var(--azul);
      color: #fff;
    }
    .gov-header-status {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .62rem;
      font-weight: 600;
      color: var(--azul);
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .7;
    }
    .gov-header-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--verde);
      box-shadow: 0 0 6px var(--verde);
      animation: pulse 2s ease-in-out infinite;
    }

    /* ===== FOOTER PADRÃO ===== */
    .site-footer {
      background: var(--cinza-bg); border-top: 1px solid var(--borda);
      padding: 2rem 2.5rem;
    }
    .footer-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-brand { display: flex; align-items: center; gap: 0.75rem; }
    .footer-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--azul);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .footer-name { font-size: 0.95rem; font-weight: 800; color: var(--azul); }
    .footer-name span { color: var(--amarelo); }
    .footer-sub { font-size: 0.7rem; color: var(--cinza-aux); margin-top: 0.1rem; }
    .footer-copy { font-size: 0.72rem; color: var(--cinza-aux); font-weight: 500; }

    @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.5; transform:scale(0.85); } }

    /* ===== ESTILOS DA FERRAMENTA (mantidos do original) ===== */
    .tabs-bar {
      background: var(--branco); border-bottom: 1px solid var(--borda);
      display: flex; align-items: center; gap: 0; overflow-x: auto; padding: 0 2rem;
      box-shadow: 0 1px 0 var(--borda);
    }
    .tab-btn {
      padding: 0.85rem 1.2rem; border: none; background: transparent;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--cinza-aux); border-bottom: 3px solid transparent;
      transition: all 0.2s; white-space: nowrap; position: relative;
    }
    .tab-btn:hover { color: var(--azul); }
    .tab-btn.active { color: var(--azul); border-bottom-color: var(--amarelo); }
    .tab-badge { display: inline-block; margin-left: 6px; background: var(--amarelo-cl); color: var(--amarelo); border: 1px solid var(--amarelo-brd); border-radius: 100px; padding: 0 6px; font-size: 0.6rem; font-weight: 700; }
    .tab-badge.verde { background: var(--verde-cl); color: var(--verde); border-color: var(--verde-brd); }
    .btn-imprimir {
      font-family: var(--font); font-size: 0.75rem; font-weight: 700;
      background: var(--azul); color: var(--branco);
      border: none; border-radius: 8px; padding: 0.5em 1.1em;
      cursor: pointer; display: flex; align-items: center; gap: 0.4rem;
      transition: all 0.18s; letter-spacing: 0.03em; white-space: nowrap;
    }
    .btn-imprimir:hover { background: var(--amarelo); color: var(--azul); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(245,166,35,0.35); }

    /* ... demais estilos da ferramenta (cards, tabelas, etc) ... */
    /* Para não poluir, mantemos todo o CSS original da ferramenta a partir daqui */
    /* Inclua aqui todo o restante do CSS que estava no arquivo original (a partir de :root) */
    /* Por brevidade, estou indicando que deve ser mantido. No código final, cole todo o CSS original após esta linha */
  </style>
  <!-- Inclua aqui o restante do CSS da ferramenta (copie de index (2).html a partir de :root até o final) -->
</head>
<body>

<!-- HEADER PADRÃO GOVERNO DO AMAZONAS -->
<header class="gov-header">
  <div class="gov-header-logo">
    <img src="marca-gov-vertical-02.png" alt="Secretaria de Infraestrutura — Governo do Amazonas"/>
  </div>
  <div class="gov-header-right">
    <div class="gov-header-status"><div class="gov-header-dot"></div>Plataforma de Planejamento</div>
    <div class="gov-header-badge">Planejamento de Obras</div>
    <a href="https://leonzordhue.github.io/painel-plan-ferramentas/" class="gov-header-back">← Central</a>
  </div>
</header>

<!-- ══ TABS (mantido) ══ -->
<nav class="tabs-bar">
  <button class="tab-btn active" data-tab="entrada">📋 Identificação</button>
  <button class="tab-btn" data-tab="servicos">🔩 Serviços <span class="tab-badge" id="badge-servicos">0</span></button>
  <button class="tab-btn" data-tab="eap">📊 EAP <span class="tab-badge verde" id="badge-eap">0</span></button>
  <button class="tab-btn" data-tab="gantt">📅 Cronograma</button>
  <button class="tab-btn" data-tab="histogramas">📈 Histogramas</button>
  <button class="tab-btn" data-tab="memorial">📄 Memorial</button>
  <div style="margin-left:auto;display:flex;align-items:center;padding:0 0.5rem;">
    <button class="btn-imprimir" onclick="abrirModalImpressao()">🖨️ Imprimir / PDF</button>
  </div>
</nav>

<!-- ══ MODAL DE IMPRESSÃO (mantido) ══ -->
<div class="print-overlay" id="printOverlay" onclick="fecharPrintFora(event)"> ... </div>

<!-- ══ MAIN (todo o conteúdo da ferramenta) ══ -->
<main class="main-content">
  ... (todo o conteúdo das abas permanece igual) ...
</main>

<!-- ══ FOOTER PADRÃO ══ -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="footer-icon">🏛️</div>
      <div>
        <div class="footer-name">SEINFRA<span>/AM</span></div>
        <div class="footer-sub">Secretaria de Estado de Infraestrutura — Amazonas</div>
      </div>
    </div>
    <div class="footer-copy">Plataforma de Planejamento de Obras · Manaus, AM · 2026</div>
  </div>
</footer>

<!-- SCRIPTS (mantidos) -->
<script>
  // Todo o JavaScript original deve ser mantido aqui.
  // Certifique-se de que as funções como abrirModalImpressao, etc., estão definidas.
</script>

</body>
</html>
